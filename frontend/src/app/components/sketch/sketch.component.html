<div class="edit-container">

  <div class="main-layout">

    <!-- Бічна панель -->
    <aside class="sidebar-controls">

      <!-- Розмір полотна -->
      <div class="size-controls">
        <div class="control-group inline">
          <label for="canvasWidth">Ширина:</label>
          <input type="number" [(ngModel)]="pixelWidth" (input)="limitDigits($event, 'width')" min="1" max="50"
            class="control-input" />
        </div>
        <div class="control-group inline">
          <label for="canvasHeight">Висота:</label>
          <input type="number" [(ngModel)]="pixelHeight" (input)="limitDigits($event, 'height')" min="1" max="50"
            class="control-input" />
        </div>
      </div>

      <div class="palette">
        <label for="colorPicker">Колір:</label>

        <!-- Колір -->
        <div class="color-picker-wrapper">
          <input type="color" id="colorPicker" [(ngModel)]="selectedColor" name="selectedColor" />
        </div>

        <!-- Кнопки -->
        <div class="tools-row">
          <button (click)="fillCanvas()" class="pixelation-button pixelation-button--small">
            Залити
          </button>

          <button (click)="setTool('eraser')" [class.active]="currentTool === 'eraser'"
            class="pixelation-button pixelation-button--small">
            Ластик
          </button>

          <button (click)="setTool('brush')" [class.active]="currentTool === 'brush'"
            class="pixelation-button pixelation-button--small">
            Пензель
          </button>
        </div>
      </div>

      <!-- Масштаб -->
      <div class="scale-section">
        <label for="scale">Масштаб:</label>
        <input type="range" id="scale" min="0.5" max="2" step="0.1" [(ngModel)]="scale" (ngModelChange)="adjustScale()"
          name="scale" />
      </div>

      <!-- Рядки -->
      <div class="control-group row-col-group">
        <label>Рядки:</label>
        <input type="number" [(ngModel)]="rowIndex" [min]="1" [max]="rows + 1"
          class="control-input small-input index-input" placeholder="Індекс" />
        <div class="button-group">
          <button (click)="addRow()" class="pixelation-button pixelation-button--small">Додати</button>
          <button (click)="removeRow()" class="pixelation-button pixelation-button--small">Видалити</button>
        </div>
      </div>

      <!-- Стовпці -->
      <div class="control-group row-col-group">
        <label>Стовпці:</label>
        <input type="number" [(ngModel)]="columnIndex" [min]="1" [max]="columns + 1"
          class="control-input small-input index-input" placeholder="Індекс" />
        <div class="button-group">
          <button (click)="addColumn()" class="pixelation-button pixelation-button--small">Додати</button>
          <button (click)="removeColumn()" class="pixelation-button pixelation-button--small">Видалити</button>
        </div>
      </div>

      <!-- Кнопка "Назад" тепер внизу бічної панелі -->
      <div class="sidebar-bottom-actions">
        <div class="button-group">
          <button (click)="undoLastAction()" [disabled]="!canUndo" class="pixelation-button pixelation-button--undo">
            Скасувати
          </button>

          <button (click)="clearCanvas()" class="pixelation-button">
            Очистити
          </button>
        </div>
      </div>

    </aside>

    <!-- Полотно -->
    <main class="canvas-wrapper">
      <canvas #sketchCanvas class="sketch-canvas" (mousedown)="startPainting($event)" (mousemove)="paintPixel($event)"
        (mouseup)="stopPainting()" (mouseleave)="stopPainting()"></canvas>
    </main>

  </div>

  <!-- Блок збереження — тепер тільки назва, формат і кнопка "Зберегти" -->
  <div class="save-section">
    <div class="save-controls">


      <div class="save-form">
        <div class="save-field">
          <label for="fileName">Назва файлу</label>
          <input type="text" id="fileName" [(ngModel)]="fileName" placeholder="Введіть назву файлу"
            class="control-input" />
        </div>

        <div class="save-field">
          <label for="fileFormat">Формат</label>
          <select id="fileFormat" [(ngModel)]="fileFormat" class="control-input">
            <option value="pdf">.pdf</option>
            <option value="png">.png</option>
            <option value="jpeg">.jpeg</option>
          </select>
        </div>
      </div>

      <div class="save-actions">
        <button (click)="saveCanvas()" class="pixelation-button pixelation-button--download">Зберегти</button>
      </div>
    </div>
  </div>

</div>
