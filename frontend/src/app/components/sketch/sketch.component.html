<h1 class="pixelation-title">Редагувати полотно</h1>

<div class="edit-container">

  <div class="main-layout">

    <!-- Бічна панель -->
    <aside class="sidebar-controls">

      <!-- Розмір полотна -->
      <div class="size-controls">
        <div class="control-group inline">
          <label for="canvasWidth">Ширина:</label>
          <input type="number" id="canvasWidth" [(ngModel)]="pixelWidth" (ngModelChange)="updateCanvasSize()" min="1" max="50" class="control-input" />
        </div>
        <div class="control-group inline">
          <label for="canvasHeight">Висота:</label>
          <input type="number" id="canvasHeight" [(ngModel)]="pixelHeight" (ngModelChange)="updateCanvasSize()" min="1" max="50" class="control-input" />
        </div>
      </div>

      <!-- Колір -->
      <div class="palette">
        <label for="colorPicker">Колір:</label>
        <input type="color" id="colorPicker" [(ngModel)]="selectedColor" name="selectedColor" />
      </div>

      <!-- Масштаб -->
      <div class="scale-section">
        <label for="scale">Масштаб:</label>
        <input type="range" id="scale" min="0.5" max="2" step="0.1" [(ngModel)]="scale" (ngModelChange)="adjustScale()" name="scale" />
      </div>

      <!-- Рядки -->
      <div class="control-group row-col-group">
        <label>Рядки:</label>  <!-- прибрали ({{ rows }}) -->
        <input type="number" [(ngModel)]="rowIndex" [min]="1" [max]="rows + 1" class="control-input small-input index-input" placeholder="Індекс" />
        <div class="button-group" style="gap: 24px;">  <!-- збільшили відстань між кнопками -->
          <button (click)="addRow()" class="pixelation-button pixelation-button--small">Додати</button>
          <button (click)="removeRow()" class="pixelation-button pixelation-button--small">Видалити</button>
        </div>
      </div>

      <!-- Стовпці -->
      <div class="control-group row-col-group">
        <label>Стовпці:</label>  <!-- прибрали ({{ columns }}) -->
        <input type="number" [(ngModel)]="columnIndex" [min]="1" [max]="columns + 1" class="control-input small-input index-input" placeholder="Індекс" />
        <div class="button-group" style="gap: 24px;">
          <button (click)="addColumn()" class="pixelation-button pixelation-button--small">Додати</button>
          <button (click)="removeColumn()" class="pixelation-button pixelation-button--small">Видалити</button>
        </div>
      </div>

    </aside>

    <!-- Полотно -->
    <main class="canvas-wrapper">
      <canvas #sketchCanvas class="sketch-canvas"
              (mousedown)="startPainting($event)"
              (mousemove)="paintPixel($event)"
              (mouseup)="stopPainting()"
              (mouseleave)="stopPainting()"></canvas>
    </main>

  </div>

  <!-- Блок збереження – компактний, кнопки поруч -->
   
  <div class="save-section">
    <div class="save-controls horizontal-save">
      
      <div class="labels-row">
        <label for="fileName">Назва файлу</label>
        <label for="fileFormat">Формат</label>
      </div>
      <div class="save-row">
        <div class="control-group">
          <input type="text" id="fileName" [(ngModel)]="fileName" placeholder="Введіть назву файлу" class="control-input" />
        </div>
        <div class="control-group">
          <select id="fileFormat" [(ngModel)]="fileFormat" class="control-input">
            <option value="pdf">.pdf</option>
            <option value="png">.png</option>
            <option value="jpeg">.jpeg</option>
          </select>
        </div>
        <div class="flex" style="gap: 10px; margin-top: 10px;">  <!-- збільшили відстань між "Зберегти" і "Назад" -->
      <button (click)="undoLastAction()" [disabled]="!canUndo" class="pixelation-button pixelation-button--undo">Назад</button>
    </div>
        <button (click)="saveCanvas()" class="pixelation-button pixelation-button--download">Зберегти</button>
      </div>


    </div>
  </div>

</div>
