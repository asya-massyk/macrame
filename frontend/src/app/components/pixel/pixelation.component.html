<div class="pixelation-container">
  <div class="pixelation-decor-left"></div>
  <div class="pixelation-decor-right"></div>

  <div *ngIf="!imageSrc" class="pixelation-welcome">
    <h1 class="pixelation-title">Створіть власну схему!</h1>
    <p class="pixelation-subtitle">Завантажте зображення, щоб перетворити його на піксельну картину</p>
    <label for="file-upload" class="pixelation-upload-button">
      <span class="pixelation-upload-icon">📷</span>
      Виберіть зображення
    </label>
    <input
      id="file-upload"
      type="file"
      accept="image/*"
      (change)="onImageUpload($event)"
      class="pixelation-input-hidden"
    />
  </div>

  <canvas
    *ngIf="imageSrc"
    #pixelationCanvas
    class="pixelation-canvas"
    (mousedown)="startCrop($event)"
    (mousemove)="updateCrop($event)"
    (mouseup)="endCrop()"
  ></canvas>

  <div *ngIf="imageSrc && !isCropping" class="pixelation-slider-container">
    <input
      type="range"
      [min]="minPixelCount"
      [max]="maxPixelCount"
      step="1"
      [(ngModel)]="sliderValue"
      (ngModelChange)="updatePixelation()"
      class="pixelation-slider"
    />
  </div>

  <div *ngIf="imageSrc" class="pixelation-download-options">
    <label class="pixelation-download-label">Назва файлу:</label>
    <input
      type="text"
      [(ngModel)]="fileName"
      placeholder="pixelated_image"
      class="pixelation-input pixelation-input--filename"
    />

    <label class="pixelation-download-label">Формат:</label>
    <select
      [(ngModel)]="downloadFormat"
      class="pixelation-input pixelation-input--format"
    >
      <option value="application/pdf">.pdf</option>
      <option value="image/png">.png</option>
      <option value="image/jpeg">.jpeg</option>
    </select>

    <label class="pixelation-download-label">Тип матеріалів:</label>
    <select
      [(ngModel)]="materialType"
      class="pixelation-input pixelation-input--material"
      (ngModelChange)="onMaterialTypeChange()"
    >
      <option value="beads">Бісер</option>
      <option value="threads">Нитки</option>
    </select>
  </div>

  <div *ngIf="imageSrc" class="pixelation-buttons">
    <button
      *ngIf="history.length > 0"
      (click)="undo()"
      class="pixelation-button pixelation-button--undo"
    >
      Скасувати
    </button>
    <button
      *ngIf="!isCropping"
      (click)="startCropping()"
      class="pixelation-button pixelation-button--crop"
    >
      Обрізати
    </button>
    <button
      (click)="rotateImage()"
      class="pixelation-button pixelation-button--rotate"
    >
      Повернути
    </button>
    <button
      (click)="generateNumberedScheme()"
      class="pixelation-button pixelation-button--scheme"
    >
      Перетворити на схему
    </button>

    <div class="button-break"></div>

    <button
      (click)="downloadImage()"
      class="pixelation-button pixelation-button--download"
    >
      Завантажити
    </button>

    <button
      *ngIf="symbolColors.length > 0"
      (click)="findMaterials()"
      class="pixelation-button pixelation-button--materials"
    >
      Знайти матеріали
    </button>
  </div>

  <div *ngIf="materialList.length > 0" class="pixelation-material-list">
    <h2 class="pixelation-material-title">Список матеріалів</h2>
    <div *ngFor="let item of materialList">
      <h3>Для позначки {{ item.number }} ({{ item.color.r }}, {{ item.color.g }}, {{ item.color.b }}):</h3>
      <table class="pixelation-material-table">
        <thead>
          <tr>
            <th>Бренд</th>
            <th>Номер</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let material of item.materials">
            <td>{{ material.brand }}</td>
            <td>{{ material.number }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
