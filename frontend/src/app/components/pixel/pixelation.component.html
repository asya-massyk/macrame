<div class="pixelation-container">

  <!-- Декорації тільки на welcome -->
  <div *ngIf="!imageSrc" class="pixelation-decor-left"></div>
  <div *ngIf="!imageSrc" class="pixelation-decor-right"></div>

  <!-- Welcome сторінка -->
  <div *ngIf="!imageSrc" class="pixelation-welcome">
    <h1 class="pixelation-title">Створіть власну схему!</h1>
    <p class="pixelation-subtitle">
      Завантажте зображення, щоб перетворити його на піксельну картину
    </p>

    <label for="file-upload" class="pixelation-upload-button">
      <span class="pixelation-upload-icon">📷</span>
      Виберіть зображення
    </label>

    <input id="file-upload" type="file" accept="image/*" (change)="onImageUpload($event)"
      class="pixelation-input-hidden" />
  </div>

  <!-- Основна сторінка -->
  <div *ngIf="imageSrc" class="edit-container">

    <div class="main-layout">

      <!--  ЛІВА ПАНЕЛЬ (ІНСТРУМЕНТИ) -->
      <aside class="sidebar-controls">

        <div class="control-group">
          <label>Кількість пікселів ({{ pixelGridLabel }}):</label>
          <input type="range" [min]="minPixelCount" [max]="maxPixelCount" step="1" [(ngModel)]="sliderValue"
            (ngModelChange)="updatePixelation()" class="pixelation-slider" />
        </div>

        <div class="control-group">
          <label>Кількість кольорів:</label>
          <div class="color-row">
            <input type="range" [min]="minColorCount" [max]="maxColorCount" [(ngModel)]="colorCount"
              (ngModelChange)="onColorCountChange()" class="pixelation-slider" />
            <input type="number" [(ngModel)]="colorCount" (ngModelChange)="onColorCountChange()"
              class="pixelation-input small-input" />
          </div>
        </div>

        <div class="control-group">
          <label>Тип зображення:</label>
          <select [(ngModel)]="schemeMode" (ngModelChange)="onSchemeModeChange()" class="pixelation-input">
            <option value="color">Кольорове</option>
            <option value="bw">Чорно-біле</option>
          </select>
        </div>

        <div class="tools-buttons">
          <button *ngIf="history.length > 1" (click)="undo()" class="pixelation-button pixelation-button--undo">
            Скасувати
          </button>

          <button (click)="startCropping()" [disabled]="isCropping" class="pixelation-button pixelation-button--crop">
            Обрізати
          </button>

          <button (click)="rotateImage()" class="pixelation-button pixelation-button--rotate">
            Повернути
          </button>
        </div>

        <button (click)="onGenerateScheme()" class="pixelation-button pixelation-button--scheme generate-btn">
          Перетворити на схему
        </button>

      </aside>

      <main class="canvas-wrapper">
        <div class="canvas-and-legend">

          <canvas #pixelationCanvas class="pixelation-canvas" (mousedown)="startCrop($event)"
            (mousemove)="updateCrop($event)" (mouseup)="endCrop()">
          </canvas>

          <div class="legend-container" *ngIf="materialList.length > 0">
            <h3 class="legend-title">Легенда матеріалів (DMC)</h3>

            <div class="legend-grid">
              <div *ngFor="let mat of materialList" class="legend-item">
                <div class="legend-color"
                  [style.background-color]="'rgb(' + mat.color.r + ',' + mat.color.g + ',' + mat.color.b + ')'">
                </div>
                <span class="legend-symbol">{{ mat.symbol }}</span>
                <span class="legend-number">DMC {{ mat.number }}</span>
              </div>
            </div>
          </div>

        </div>
      </main>

      <!--  ПРАВА ПАНЕЛЬ ТЕПЕР ОКРЕМО -->
      <aside class="save-sidebar">

        <div class="save-field">
          <label>Формат:</label>
          <select [(ngModel)]="downloadFormat" class="pixelation-input">
            <option value="application/pdf">.pdf</option>
            <option value="image/png">.png</option>
            <option value="image/jpeg">.jpeg</option>
          </select>
        </div>

        <div class="save-field">
          <label>Тип матеріалів:</label>
          <select [(ngModel)]="materialType" (ngModelChange)="onMaterialTypeChange()" class="pixelation-input">
            <option value="beads">Бісер</option>
            <option value="threads">Нитки</option>
          </select>
        </div>

        <div class="save-field">
          <label>Назва файлу:</label>
          <input type="text" [(ngModel)]="fileName" placeholder="pixelated_image" class="pixelation-input" />
        </div>

        <button (click)="findMaterials()" [disabled]="symbolColors.length === 0"
          class="pixelation-button pixelation-button--materials">
          Знайти матеріали
        </button>

        <button (click)="downloadImage()" class="pixelation-button pixelation-button--download">
          Зберегти
        </button>

      </aside>
